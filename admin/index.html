<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- font-preload-patched -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" >
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"></noscript>
<script src="../js/theme-init.js"></script>
<style>
#page-loader{position:fixed;inset:0;background:#0d0f14;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;transition:opacity .3s,visibility .3s;animation:_ldrTimeout 0s 3s forwards}
[data-theme="light"] #page-loader{background:#f4f5f9}
[data-theme="warm"] #page-loader{background:#0f0c07}
@keyframes _ldrTimeout{to{opacity:0;visibility:hidden;pointer-events:none}}
#page-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-logo{font-family:Georgia,serif;font-size:1.75rem;color:#c9a84c;letter-spacing:.05em}
.loader-dots{display:flex;gap:.5rem}
.loader-dots span{width:8px;height:8px;border-radius:50%;background:#a07a30;animation:_ldrDot 1.2s ease infinite}
.loader-dots span:nth-child(2){animation-delay:.2s}
.loader-dots span:nth-child(3){animation-delay:.4s}
@keyframes _ldrDot{0%,100%{opacity:.3}50%{opacity:1}}
#page-progress{position:fixed;top:0;left:0;height:2px;background:#c9a84c;z-index:10000;width:0;transition:width .3s ease}
#page-progress.active{animation:_ldrProgress 1.5s ease-out forwards}
@keyframes _ldrProgress{0%{width:0}70%{width:85%}100%{width:95%}}
#page-progress.done{width:100%!important}
</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Login — ZenMarket</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0d0f14" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f4f5f9" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"></noscript>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/loader.css">
  <link rel="stylesheet" href="../css/pages/admin-index.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="page-loader"><div class="loader-logo">ZenMarket</div><div class="loader-dots"><span></span><span></span><span></span></div></div>
  <div id="page-progress"></div>
  <div id="toast-container"></div>

  <div class="admin-login-card anim-scale-in">
    <div class="admin-login-logo">
      <div class="logo">Zen<span>Market</span></div>
      <div class="sub">Admin Panel</div>
    </div>

    <!-- ── Step 1: Email + Password ─────────────────────────── -->
    <form id="admin-login-form" novalidate>
      <div class="form-group">
        <label class="form-label required">Email Address</label>
        <div class="input-group">
          <i class="input-icon fa-solid fa-envelope"></i>
          <input class="form-control" type="email" id="email" placeholder="admin@yourdomain.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Password</label>
        <div class="input-group">
          <i class="input-icon fa-solid fa-lock"></i>
          <input class="form-control" type="password" id="password" placeholder="Your admin password" required>
        </div>
      </div>

      <div id="login-error" style="display:none;background:var(--clr-error-bg);color:var(--clr-error);padding:.75rem 1rem;border-radius:var(--r-md);font-size:.875rem;margin-bottom:1rem;gap:.5rem;align-items:center">
        <i class="fa-solid fa-triangle-exclamation"></i> <span id="login-error-text">Invalid credentials. Please try again.</span>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
        <i class="fa-solid fa-lock"></i> Sign In to Admin
      </button>
    </form>

    <!-- ── Step 2: Magic Link Sent ────────────────────────────── -->
    <div id="magic-link-step" style="display:none">
      <div style="text-align:center;margin-bottom:1.75rem">
        <div style="width:56px;height:56px;border-radius:16px;background:var(--clr-gold-bg);color:var(--clr-gold);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1rem">
          <i class="fa-solid fa-envelope-circle-check"></i>
        </div>
        <div style="font-size:1rem;font-weight:600;color:var(--clr-text);margin-bottom:.5rem">Magic link sent!</div>
        <div style="font-size:.875rem;color:var(--clr-text-3);line-height:1.7">
          A secure sign-in link was sent to<br>
          <strong id="magic-email-display" style="color:var(--clr-text-2)"></strong><br>
          <span style="font-size:.8125rem">Open the email and click the link to access the admin dashboard.</span>
        </div>
      </div>

      <div style="background:var(--clr-bg-2);border:1px solid var(--clr-border);border-radius:var(--r-md);padding:.875rem 1rem;font-size:.8125rem;color:var(--clr-text-3);line-height:1.6;margin-bottom:1.25rem">
        <i class="fa-solid fa-circle-info" style="color:var(--clr-gold);margin-right:.35rem"></i>
        The link expires in <strong style="color:var(--clr-text-2)">1 hour</strong>. Check your spam folder if it doesn't arrive within a minute.
      </div>

      <div style="text-align:center">
        <button type="button" id="magic-back-btn"
          style="background:none;border:none;color:var(--clr-text-3);font-size:.8125rem;cursor:pointer;padding:.375rem .75rem;border-radius:var(--r-sm)">
          <i class="fa-solid fa-arrow-left"></i> Back to login
        </button>
      </div>
    </div>

    <div style="text-align:center;margin-top:1.25rem">
      <a href="../index.html" style="font-size:.8125rem;color:var(--clr-text-3)">
        <i class="fa-solid fa-arrow-left"></i> Back to Store
      </a>
    </div>
  </div>

<script type="module">
    import { withLoader } from '../js/loader.js';
    import { adminLogin, getAdminSession } from '../js/admin/admin-auth.js';
    import toast from '../js/toast.js';

    withLoader(async () => {
      if (getAdminSession()) { window.location.href = 'dashboard.html'; return; }

      // ── UI helpers ────────────────────────────────────────────
      const showStep = step => {
        document.getElementById('admin-login-form').style.display    = step === 1 ? '' : 'none';
        document.getElementById('magic-link-step').style.display     = step === 2 ? '' : 'none';
      };

      const setLoginError = (msg) => {
        const el = document.getElementById('login-error');
        document.getElementById('login-error-text').textContent = msg;
        el.style.display = msg ? 'flex' : 'none';
      };

      // ── Step 1: email + password ──────────────────────────────
      document.getElementById('admin-login-form').addEventListener('submit', async e => {
        e.preventDefault();
        setLoginError('');
        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in…';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const result   = await adminLogin(email, password);

        if (!result.success) {
          setLoginError(result.error || 'Invalid credentials.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-lock"></i> Sign In to Admin';
          return;
        }

        if (result.magicLinkPending) {
          // Supabase admin path: show "check your email" screen
          document.getElementById('magic-email-display').textContent = result.email;
          showStep(2);
          toast.success('Magic link sent', `Check ${result.email} for your sign-in link`);
        } else {
          // Legacy env-admin: session already set in sessionStorage
          toast.success('Welcome!', 'Redirecting to dashboard…');
          setTimeout(() => window.location.href = 'dashboard.html', 700);
        }
      });

      // ── Back to step 1 ────────────────────────────────────────
      document.getElementById('magic-back-btn').addEventListener('click', () => {
        showStep(1);
        const loginBtn = document.getElementById('login-btn');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fa-solid fa-lock"></i> Sign In to Admin';
      });
    });
  </script>
</body>
</html>
